name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Keep examples sanitized. Do not include real hashes or recovered passwords.
