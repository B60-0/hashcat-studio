name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            artifact: hashcat-studio-macos
            binary: build/bin/hashcat-studio.app
          - name: linux
            os: ubuntu-22.04
            artifact: hashcat-studio-linux
            binary: build/bin/hashcat-studio
          - name: windows
            os: windows-latest
            artifact: hashcat-studio-windows
            binary: build/bin/hashcat-studio.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build app
        run: wails build -clean

      - name: Package Unix build
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          if [ -d "${{ matrix.binary }}" ]; then
            ditto -c -k --sequesterRsrc --keepParent "${{ matrix.binary }}" "dist/${{ matrix.artifact }}.zip"
          else
            tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C build/bin "$(basename "${{ matrix.binary }}")"
          fi

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "dist/${{ matrix.artifact }}.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
